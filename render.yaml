services:
  - type: web
    name: aetherlink-api
    runtime: python
    rootDir: ai-server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DEFAULT_GROQ_MODEL
        value: llama-3.1-8b-instant
